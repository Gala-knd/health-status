name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    # Используем стратегию с одной версией для начала
    strategy:
      matrix:
        node-version: [20.x]  # Начнём с отладки на одной версии

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    
    # Подробная отладочная информация
    - name: Debug system info
      run: |
        echo "=== System Info ==="
        node --version
        npm --version
        pwd
        ls -la
        echo "=== Package.json ==="
        cat package.json
        echo "=== Disk space ==="
        df -h
    
    # Чистая установка с подробным выводом
    - name: Clean install with debug
      run: |
        rm -rf node_modules package-lock.json
        npm install --verbose
        
    # Запуск тестов с максимальной детализацией
    - name: Run tests with debug
      run: |
        npm test -- --verbose --runInBand --no-cache
